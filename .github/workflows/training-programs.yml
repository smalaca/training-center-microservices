name: Training Programs Module

on:
  push:
    branches:
      - master
    paths:
      - 'training-programs/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'training-programs/**'

permissions:
  pull-requests: read

jobs:
  Tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build Annotations
        working-directory: ./annotations
        run: mvn clean install

      - name: Build Test Annotations
        working-directory: ./annotations-test
        run: mvn clean install

      - name: Build Schema Registry
        working-directory: ./schema-registry
        run: mvn clean install

      - name: Tests
        working-directory: ./training-programs
        run: mvn clean verify

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v5.3.1
        with:
          projectBaseDir: ./training-programs
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io